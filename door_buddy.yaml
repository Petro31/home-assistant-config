main_door:
  name: Main Door
  source: binary_sensor.main_door
  unique_id: eb762336-a7ce-4c57-8fdf-13e05bf89997
  <<: &entrance
    lux_threshold: 500
    lux_sensor: sensor.deck_motion_sensor_illuminance
    people_tracker: sensor.people_at_home
    use_sun: yes
    notify: on
  on_duration:
    seconds: 120
  open_too_long_duration:
    seconds: 90
  quiet_window:
    seconds: 120
  turn_on:
  - switch.foyer

garage_entrance:
  name: Garage Entrance
  source: binary_sensor.garage_entry_door
  unique_id: 30edf98f-b119-4728-a343-1cac2ef3af28
  <<: *entrance
  on_duration:
    seconds: 120
  open_too_long_duration:
    seconds: 90
  quiet_window:
    seconds: 120
  turn_on:
  - switch.garage_entry
  - switch.garage_cans

sliding_door:
  name: Sliding Door
  source: binary_sensor.sliding_door
  unique_id: eb256a1b-b7b7-4b3b-9420-149febabd027
  <<: *entrance
  on_duration:
    seconds: 30
  open_too_long_duration:
    seconds: 240
  quiet_window:
    seconds: 120
  turn_on:
  - light.dining_room_chandelier
  - switch.flood_light
  - switch.sliding_door_sconce

