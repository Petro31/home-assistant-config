front_garage_door:
  name: Front Garage Door
  source: cover.front_garage_door
  unique_id: 0659ff4d-4e90-428d-ba60-1f09c58fa7eb
  <<: &garage_door
    people_tracker: sensor.people_at_home
    notify: on
    open_too_long_duration:
      seconds: 300

rear_garage_door:
  name: Rear Garage Door
  source: cover.rear_garage_door
  unique_id: 49bcd1ce-dc64-4448-be16-67023dcf3981
  <<: *garage_door

passenger_door:
  name: Passenger Door
  source: binary_sensor.passenger_door
  unique_id: af17f25c-ba55-407c-9e0f-47edff24a175
  people_tracker: sensor.people_at_home
  notify: on
  open_too_long_duration:
    seconds: 120
  quiet_window:
    seconds: 120

server_room_door:
  name: Server Room Door
  source: binary_sensor.server_room_door_contact
  unique_id: 7f41ec35-9a92-4cf0-9b32-17f5feef116d
  turn_on:
  - switch.server_room_switch